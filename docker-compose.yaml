networks:
  db-security-net:
    driver: bridge

volumes:
  mysql_data:
  prometheus_data:
  grafana_data:
  acra_keys:

services:
  mysql:
    image: mysql:8.0
    container_name: target-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: testdb
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - db-security-net
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  acra-server:
    image: cossacklabs/acra-server:latest
    container_name: acra-proxy
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - ACRA_MASTER_KEY=your_strong_master_key_here_123456789
    command: >
      --db_host=mysql
      --db_port=3306
    networks:
      - db-security-net
    ports:
      - "9393:9393"
      - "9399:9399"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - prometheus_data:/prometheus
    networks:
      - db-security-net
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - db-security-net
    ports:
      - "3000:3000"